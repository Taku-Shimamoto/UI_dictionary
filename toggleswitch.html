<!DOCTYPE html>
<html lang="ja">
    <head>
        <link rel="stylesheet" href="common.css" />
        <meta charset="UTF-8" />
        <title>UI辞典 トグルスイッチ</title>
    </head>
    <style>
        .switch-outer {
            background-color: #ddd;
            border-radius: calc(infinity * 1px);
            height: 40px;
            margin: 8px 0;
            position: relative;
            transition: all .5s ease;
            width: 80px;
        }

        .switch-outer:hover {
            cursor: pointer;
        }

        .switch-outer.active {
            background-color: #0f0;
        }

        .toggle-switch {
            background-color: #fff;
            border-radius: 50%;
            bottom: 0;
            box-shadow: 1px 1px 7px #B7B7B7, -1px -1px 4px #CECECE inset;
            height: 32px;
            left: 4px;
            margin: auto;
            position: absolute;
            top: 0;
            transition: left .5s ease;
            width: 32px;
        }

        .toggle-switch.active {
            left: 44px;
        }
    </style>
    <body>
        <header>
            <h1><a href="index.html">UI Dictionary</a></h1>
            <div id="hamburger" class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav id="hamburger_nav">
                <ul>
                    <li><a class="nav-link" href="#">ページの一番上に戻る</a></li>
                    <li><a class="nav-link" href="#feature">特徴</a></li>
                    <li><a class="nav-link" href="#code">ソースコードの一例</a></li>
                    <li><a class="nav-link" href="#html_code">HTML</a></li>
                    <li><a class="nav-link" href="#css_code">CSS</a></li>
                    <li><a class="nav-link" href="#js_code">JavaScript</a></li>
                    <li><a class="nav-link" href="#explanation">解説</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <nav class="breadcrumb-nav">
                <a href="index.html">ホーム</a> &gt; トグルスイッチ
            </nav>
            <p>クリックしてみましょう。</p>
            <div class="switch-outer">
                <div class="toggle-switch"></div>
            </div>
            <div class="switch-outer">
                <div class="toggle-switch"></div>
            </div>
            <div class="switch-outer">
                <div class="toggle-switch"></div>
            </div>
            <h2 id="feature">特徴</h2>
            <p>
                クリックすると内側の丸いボタンが右側に動き、スイッチ背面の色が灰色→緑色に変化します。<br />
                もう一度クリックすると元の状態に戻ります。
            </p>
            <h2 id="code">ソースコードの一例</h2>
            <h3 id="html_code">HTML</h3>
            <input type="button" class="copy-button" value="コードをコピーする" />
            <pre><code class="copy-text"><!--

<!--

            <h3 id="css_code">CSS</h3>
            <input type="button" class="copy-button" value="コードをコピーする" />
            <pre><code class="copy-text"><!--

<!--

            <h3 id="js_code">JavaScript</h3>
            <input type="button" class="copy-button" value="コードをコピーする" />
            <pre><code class="copy-text"><!--

            <div id="page_top" class="page-top">
                <a href="#">Page Top</a>
            </div>
        </main>
    </body>
    <script src="common.js" defer></script>
    <script>
        const switchOuters = Array.from(document.getElementsByClassName("switch-outer"));
        const toggleSwitches = Array.from(document.getElementsByClassName("toggle-switch"));

        function toggleButtonActive(i) {
            const isActive = switchOuters[i].classList.contains("active");
            switchOuters[i].classList.toggle("active", !isActive);
            toggleSwitches[i].classList.toggle("active", !isActive);
        }

        switchOuters.forEach((outer, i) => outer.addEventListener("click", () => toggleButtonActive(i)));
    </script>
