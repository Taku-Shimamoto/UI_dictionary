    <script>
        const signupIdForm = document.getElementById("signup_id");
        const passwordForm = document.getElementById("password");
        const ID_MIN_LENGTH = 5;
        const PASSWORD_MIN_LENGTH = 8;
        const signupIdRegExp = new RegExp(`^\\w{${ID_MIN_LENGTH},}$`);
        const passwordRegExp = new RegExp(`^\\w{${PASSWORD_MIN_LENGTH},}$`);

        const idErrorMessage = document.getElementById("id_errormessage");
        const passwordErrorMessage = document.getElementById("password_errormessage");

const PASSWORD_STRENGTH = {
  0: { color: "red", label: "弱い", message: "8文字以上にしてください" },
  1: { color: "red", label: "弱い", message: "8文字以上にしてください" },
  2: { color: "yellow", label: "普通", message: "もう少し複雑にできます" },
  3: { color: "yellow", label: "普通", message: "記号や大文字を追加すると良いです" },
  4: { color: "green", label: "強い", message: "良いパスワードです" },
  5: { color: "green", label: "非常に強い", message: "十分安全です" },
};

function getPasswordStrength(pw) {
  let score = 0;

  if (pw.length >= 8) score++;
  if (/[a-z]/.test(pw)) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  return score;
}

passwordForm.addEventListener("input", () => {
  const score = getPasswordStrength(passwordForm.value);
  const result = PASSWORD_STRENGTH[score];

  passwordErrorMessage.textContent = result.message;
  passwordErrorMessage.style.color = result.color;
});

        signupIdForm.addEventListener("input", () => {
            if (signupIdForm.value.trim() === "") {
                idErrorMessage.textContent = "ユーザーIDは入力必須です。";
            } else if (!signupIdRegExp.test(signupIdForm.value)) {
                idErrorMessage.textContent = "ユーザーIDの形式が正しくありません。";
            } else {
                idErrorMessage.textContent = "";
            }
        });
